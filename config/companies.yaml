# Merit America employer tier registry. Fuzzy-matched (token_set_ratio) against
# the scraped company name. Unknown companies fall through to Brave employer
# intel (merit/employer_intel.py) and are logged to
# data/merit_unmatched_companies.log for promotion here.
#
# Tiers:
#   S — household-name mega-caps + sector-defining blue chips
#   A — very strong national brands / clear leaders within a vertical
#   B — solid, well-known mid-caps
#   C — default (no entry needed)
#
# Seeded across all nine Merit tracks (IT support, data analytics, UX, cyber,
# PM, HR, supply chain, semiconductor, operations). Expand aggressively.

fuzzy_threshold: 88

