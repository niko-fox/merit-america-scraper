# Two-tier exclusions, both case-insensitive regex with word boundaries.
#
# hard_exclusions: title is dropped if ANY match — no exceptions. Senior+ and
#   people-leadership above lower-intermediate.
# soft_exclusions: dropped UNLESS the title also contains a junior_signal.
#   This keeps "Junior Project Manager" / "Associate Project Manager" while
#   still dropping a bare "IT Support Manager".
hard_exclusions:
  - '\bsenior\b'
  - '\bsr\.?\b'
  - '\blead\b'
  - '\bprincipal\b'
  - '\bstaff\b'
  - '\bdirector\b'
  - '\bhead of\b'
  - '\bvp\b'
  - '\bvice[- ]president\b'
  - '\bchief\b'
  - '\bsvp\b'
  - '\bevp\b'
  - '\bfounder\b'
  - '\bowner\b'
  - '\barchitect\b'
  - '\biii\b'        # level III and up
  - '\biv\b'
  - '\bexpert\b'

soft_exclusions:
  - '\bmanager\b'
  - '\bsupervisor\b'

junior_signals:
  - '\bjunior\b'
  - '\bjr\.?\b'
  - '\bassociate\b'
  - '\bassistant\b'
  - '\bentry[- ]level\b'
  - '\bintern\b'
  - '\btrainee\b'
  - '\bapprentice\b'
  - '\bcoordinator\b'
